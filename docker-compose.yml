version: '3.8'

services:
  db:
    image: postgres:15
    container_name: pg_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vector_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgvector:
    image: 'pgvector/pgvector:latest'
    depends_on:
      - db
    environment:
      - POSTGRES_DB=vector_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password

volumes:
  pgdata: